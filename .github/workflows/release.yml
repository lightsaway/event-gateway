name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Match tag to Cargo version
        run: make release-validate TAG="${GITHUB_REF_NAME}"

  docs:
    name: Build documentation
    needs: validate
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.3

      - uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.24.2

      - uses: actions/configure-pages@v5

      - name: Build and check site
        run: make ci-docs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: book

  binaries:
    name: Binary (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config perl \
            libcurl4-openssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          key: ${{ matrix.target }}

      - name: Build UI and binary
        run: make build-release TARGET=${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          asset="event-gateway-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          staging="${asset%.tar.gz}"
          mkdir -p "$staging/configs"
          cp "target/${{ matrix.target }}/release/event-gateway" "$staging/"
          cp README.md "$staging/"
          cp configs/minimal-config.toml configs/config-pgmq.toml "$staging/configs/"
          tar czf "$asset" "$staging"
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Attest binary archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.asset }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Attest image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish:
    name: Publish GitHub Release
    needs:
      - validate
      - binaries
      - docker
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Verify assets
        working-directory: dist
        run: |
          sha256sum --check --ignore-missing *.sha256
          cat *.sha256 > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/SHA256SUMS

  deploy-docs:
    name: Publish documentation
    needs:
      - docs
      - publish
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
